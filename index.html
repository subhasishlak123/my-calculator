<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calc by Subhasish Lakshman</title>
    <style>
        /* CSS: Full Screen & Notch Support */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        .calculator {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* FIXED: Added Safe Area Inset to clear the Notification Panel */
        .brand-credit {
            position: absolute;
            top: calc(50px + env(safe-area-inset-top)); /* Moves it below the clock/notches */
            right: 25px;
            text-align: right;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            z-index: 100;
            pointer-events: none;
        }

        .brand-credit span {
            color: #ff9f0a; /* Signature Orange */
            font-weight: bold;
            display: block; /* Puts name on a new line */
            font-size: 13px;
        }

        #display {
            flex: 1.5;
            width: 100%;
            background-color: #000;
            color: #fff;
            border: none;
            text-align: right;
            /* Extra top padding so numbers don't touch the credit */
            padding: calc(100px + env(safe-area-inset-top)) 25px 20px;
            font-size: 20vw;
            outline: none;
            font-weight: 200;
        }

        .buttons {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 1px;
            background-color: #333;
            /* Padding at the bottom for gesture navigation bars */
            padding-bottom: env(safe-area-inset-bottom);
        }

        button {
            width: 100%;
            height: 100%;
            border: none;
            font-size: 5vh;
            cursor: pointer;
            background-color: #1c1c1c;
            color: white;
            transition: background 0.1s;
        }

        button:active {
            background-color: #444;
        }

        .operator {
            background-color: #ff9f0a;
            font-weight: 500;
        }

        .special {
            background-color: #a5a5a5;
            color: black;
        }

        .double {
            grid-column: span 2;
        }
    </style>
</head>
<body>

    <!-- Upper Corner Credit (Safe from Status Bar) -->
    <div class="brand-credit">
        Build by <span>SUBHASISH LAKSHMAN</span>
    </div>

    <div class="calculator">
        <!-- Result Screen -->
        <input type="text" id="display" readonly placeholder="0">

        <!-- Button Layout -->
        <div class="buttons">
            <button class="special" onclick="clearDisplay()">AC</button>
            <button class="special" onclick="deleteDigit()">DEL</button>
            <button class="special" onclick="addToDisplay('%')">%</button>
            <button class="operator" onclick="addToDisplay('/')">÷</button>

            <button onclick="addToDisplay('7')">7</button>
            <button onclick="addToDisplay('8')">8</button>
            <button onclick="addToDisplay('9')">9</button>
            <button class="operator" onclick="addToDisplay('*')">×</button>

            <button onclick="addToDisplay('4')">4</button>
            <button onclick="addToDisplay('5')">5</button>
            <button onclick="addToDisplay('6')">6</button>
            <button class="operator" onclick="addToDisplay('-')">−</button>

            <button onclick="addToDisplay('1')">1</button>
            <button onclick="addToDisplay('2')">2</button>
            <button onclick="addToDisplay('3')">3</button>
            <button class="operator" onclick="addToDisplay('+')">+</button>

            <button class="double" onclick="addToDisplay('0')">0</button>
            <button onclick="addToDisplay('.')">.</button>
            <button class="operator" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function addToDisplay(input) {
            if (display.value === "Error") clearDisplay();
            display.value += input;
        }

        function clearDisplay() {
            display.value = '';
        }

        function deleteDigit() {
            display.value = display.value.toString().slice(0, -1);
        }

        function calculate() {
            try {
                let expression = display.value.replace('×', '*').replace('÷', '/');
                let result = eval(expression);
                if (result.toString().includes('.')) {
                    result = parseFloat(result.toFixed(6));
                }
                display.value = result;
            } catch (error) {
                display.value = "Error";
            }
        }
    </script>
</body>
</html>
